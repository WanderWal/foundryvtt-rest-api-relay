# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Deploy and Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  discussions: write
  packages: write

jobs:
  deploy:
    name: Deploy and Release
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag version number
        id: get_version
        uses: battila7/get-version-action@v2
        if: startsWith(github.ref, 'refs/tags/')

      # Generate release notes BEFORE any branch switching or commits
      # This ensures we capture all commits between tags, not just the version bump
      - name: Generate Release Notes
        id: generate_notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # Get previous tag by version sort (not git ancestry, which breaks with merge commits)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          # If no previous tag, get all commits; otherwise get commits between tags
          # Filter out [skip ci] commits (version bump noise from previous releases)
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- [%s](https://github.com/${{ github.repository }}/commit/%H)" --reverse --grep='\[skip ci\]' --invert-grep)
          else
            COMMITS=$(git log --pretty=format:"- [%s](https://github.com/${{ github.repository }}/commit/%H)" ${PREVIOUS_TAG}..HEAD --reverse --grep='\[skip ci\]' --invert-grep)
          fi
          
          # Format release notes
          FORMATTED_NOTES="## Changes\n${COMMITS}"
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo -e "${FORMATTED_NOTES}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # Update version in package.json and Go server
      - name: Update version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          echo "Updating version to $VERSION"

          # Switch to main branch first
          git checkout main
          git pull origin main

          # Update version in all relevant files
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp.json && mv package.tmp.json package.json
          jq --arg v "$VERSION" '.version = $v' frontend/package.json > frontend/package.tmp.json && mv frontend/package.tmp.json frontend/package.json
          sed -i "s/const version = .*/const version = \"$VERSION\"/" go-relay/cmd/server/main.go
          sed -i "s/const apiVersion = .*/const apiVersion = \"$VERSION\"/" go-relay/cmd/docgen/main.go

          # Regenerate OpenAPI / AsyncAPI / api-docs JSON with the new version
          cd go-relay && go run ./cmd/docgen/ && cd ..

          # Configure git
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Commit and push changes only if something actually changed
          git add package.json frontend/package.json go-relay/cmd/server/main.go go-relay/cmd/docgen/main.go public/openapi.json public/asyncapi.json public/api-docs.json
          if git diff --cached --quiet; then
            echo "Version already up to date, skipping commit"
          else
            git commit -m "bump version to $VERSION [skip ci]"
            git push origin main
          fi

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      # Extract Docker tags based on event type
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/foundryvtt-rest-api-relay
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}

      # Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: go-relay/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Deploy to Fly.io (always on main push, optional on tags)
      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Create GitHub release for tags
      - name: Create ZIP archive
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          zip -r release/foundryvtt-rest-api-relay.zip . -x "node_modules/*" -x ".git/*" -x ".github/*" -x "go-relay/tmp/*" -x "go-relay/data/*"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1.16.0
        with:
          allowUpdates: false
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          token: ${{ secrets.GH_PAT }}
          artifacts: "./release/foundryvtt-rest-api-relay.zip"
          tag: ${{ github.ref_name }}
          body: ${{ env.RELEASE_NOTES }}

      - name: Checkout wiki repository
        uses: actions/checkout@v3
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GH_PAT }} # Personal access token with repo permissions

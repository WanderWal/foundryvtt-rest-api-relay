# fly.toml app configuration file
app = 'foundryrestapi'
primary_region = 'ord'

[build]
  dockerfile = "go-relay/Dockerfile"
  [build.args]
    ALGOLIA_APP_ID = "S6TB6KX8K6"
    ALGOLIA_SEARCH_API_KEY = "54cb86f54a675d0bd897ce1e074b922c"
    ALGOLIA_INDEX_NAME = "FVTT REST API Docs crawler"

[http]
  # This is the port Fly.io will expose to the internet
  port = 3010

[http_service]
  # This is the port your app listens on inside the container
  internal_port = 3010
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 2  # Keep 2 machines for high availability
  max_machines_running = 5  # Allow scaling up to 5 machines
  force_instance_key = true
  
  # Add restart_machine_strategy for more graceful handling
  restart_machine_strategy = "rolling"
  
  [[http_service.checks]]
    grace_period = "45s"  # Increased from 30s to allow more time for Redis reconnection
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"  # Increased from 5s

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 500

# Add this for private networking
[experimental]
  enable_6pn = true  # Enable private networking for VM-to-VM communication

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2

[[vm.mounts]]
  source = "myapp_data"
  destination = "/data"
  
[metrics]
  # Fly.io Prometheus scraper hits this port on the private network.
  # The relay serves /metrics on this internal port alongside the admin dashboard.
  port = 9091
  path = "/metrics"

[env]
  APP_ENV = "production"
  ADMIN_SECURE_COOKIES = "true"
  DB_TYPE = "postgres"
  MONTHLY_REQUEST_LIMIT = "5000"
  REDIS_ENABLED = "true"
  REDIS_CLIENT_EXPIRY = "14400"  # 4 hours in seconds
  ADMIN_INTERNAL_PORT = "9091"   # enables the internal listener; Fly scrapes /metrics from here
  ADMIN_ALLOWED_IPS = "fdaa::/16,172.16.0.0/12"  # Fly IPv6 private network + internal IPv4 range
  ALLOW_HEADLESS = "false"       # sorry, no headless sessions on the public relay
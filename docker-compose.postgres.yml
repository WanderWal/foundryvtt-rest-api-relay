# Postgres deployment — for self-hosted setups that prefer Postgres over SQLite,
# or for local development/testing.
# No billing, no request limits by default.
#
# Quick start:
#   1. docker compose -f docker-compose.postgres.yml up -d
#
# Secrets (CREDENTIALS_ENCRYPTION_KEY, ADMIN_JWT_SECRET) are auto-generated on
# first startup and saved to ./data/.secrets.env.
#
# Optional: copy .env.example to .env to configure SMTP, rate limits, etc.
#
# For multi-instance (horizontal scaling) with Redis pub/sub:
#   - Uncomment the redis service below
#   - Uncomment REDIS_URL on the relay service
#   - Or set REDIS_URL in .env to point at a managed Redis (Upstash, Fly Redis, etc.)
#
services:
  db:
    image: postgres:16
    container_name: foundryvtt-relay-db
    environment:
      - POSTGRES_DB=foundryvtt_relay
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  relay:
    image: threehats/foundryvtt-rest-api-relay:latest
    container_name: foundryvtt-rest-api-relay
    env_file:
      - path: .env
        required: false
    environment:
      - DB_TYPE=postgres
      - DATABASE_URL=postgres://postgres:postgres@db:5432/foundryvtt_relay
      - APP_ENV=production
      # - REDIS_URL=redis://redis:6379  # uncomment if using the redis service below,
      #                                 # or set to your managed Redis URL in .env
    volumes:
      - ./data:/app/data
    ports:
      - "3010:3010"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # ── GPU acceleration ─────────────────────────────────────────────────────
    # Requires Docker Engine (CE) on Linux. Docker Desktop does not support
    # NVIDIA or DRI GPU passthrough.
    #
    # Intel / AMD — expose the DRI device (render group resolved automatically):
    # devices:
    #   - /dev/dri:/dev/dri
    #
    # NVIDIA — Option A (recommended): set nvidia as the default Docker runtime:
    #   sudo nvidia-ctk runtime configure --runtime=docker --set-as-default
    #   sudo systemctl restart docker
    # The image sets NVIDIA_VISIBLE_DEVICES=all and
    # NVIDIA_DRIVER_CAPABILITIES=graphics,utility in ENV so the NVIDIA runtime
    # injects the graphics stack automatically — no extra compose config needed.
    #
    # Requires nvidia-container-toolkit >= ~1.14. Some distros (Pop!_OS, Ubuntu)
    # ship older versions that fail with modern drivers (560+). If you see
    # "nvidia-container-runtime did not terminate successfully: exit status 2",
    # upgrade all four toolkit packages from the NVIDIA repo at once:
    #   sudo apt-get install \
    #     nvidia-container-toolkit=1.19.0-1 \
    #     nvidia-container-toolkit-base=1.19.0-1 \
    #     libnvidia-container-tools=1.19.0-1 \
    #     libnvidia-container1=1.19.0-1
    #
    # NVIDIA — Option B: CDI (no default runtime change needed):
    #   sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
    #   sudo systemctl restart docker
    # Then uncomment:
    # devices:
    #   - "nvidia.com/gpu=all"
    # ─────────────────────────────────────────────────────────────────────────

  # redis:
  #   image: redis:7-alpine
  #   container_name: foundryvtt-relay-redis
  #   restart: unless-stopped

volumes:
  postgres_data:
